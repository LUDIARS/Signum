server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — hash-stamped by Vite, safe to cache aggressively.
    location ~* \.(js|css|woff2?|svg|png|jpg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + WS reverse proxy — same origin as the SPA so CORS stays simple.
    location /api/ {
        proxy_pass http://signum-api:3200/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /ws {
        proxy_pass http://signum-api:3200/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600;
    }

    # SPA fallback — React Router 7 BrowserRouter.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
